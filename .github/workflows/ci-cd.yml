name: CI-CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Run native unit tests
        run: python -m platformio test -e native

      - name: Build Arduino Uno firmware
        run: python -m platformio run -e uno

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: brain-game-firmware-uno
          path: .pio/build/uno/firmware.hex
          if-no-files-found: error
